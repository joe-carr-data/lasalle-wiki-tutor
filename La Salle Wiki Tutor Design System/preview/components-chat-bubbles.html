<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.bubble { font-family: var(--font-sans); padding: 12px 16px; border-radius: 14px; max-width: 84%; line-height: 1.5; font-size: 14px; }
.b-user { background: var(--ls-blue); color: white; align-self: flex-end; border-bottom-right-radius: 6px; }
.b-agent { background: var(--white); color: var(--tuatara); border: 1px solid var(--border); border-bottom-left-radius: 6px; }
.stack { display: flex; flex-direction: column; gap: 10px; }
.cap { font-family: var(--font-mono); font-size: 11px; color: var(--storm-dust); margin-bottom: 12px; }
.cite { display: inline-block; margin-top: 8px; background: var(--ls-blue-soft); color: var(--ls-blue-press); font-family: var(--font-mono); font-size: 12px; padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(79,168,216,.25); }
</style>
</head><body>
<div class="card" style="background:var(--elev-1)">
  <div class="cap">Chat bubbles — user (right · LS Blue) · agent (left · paper)</div>
  <div class="stack">
    <div class="bubble b-user">Is the AI bachelor in English?</div>
    <div class="bubble b-agent">Yes — the Bachelor's Degree in Artificial Intelligence is taught in English. It's a 4-year, 240 ECTS on-site program in Barcelona, starting in September.<br><span class="cite">en/bachelor-artificial-intelligence</span></div>
  </div>
</div>
</body></html>
