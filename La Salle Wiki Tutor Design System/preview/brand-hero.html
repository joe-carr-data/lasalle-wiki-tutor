<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.hero { position: relative; height: 240px; border-radius: 14px; overflow: hidden; background: var(--ink-900); }
.hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.95; }
.hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 30%, rgba(0,0,0,.45) 100%); }
.tagline { position: absolute; right: 22px; bottom: 18px; font-family: var(--font-script); font-weight: 600; font-size: 38px; color: white; text-shadow: 0 2px 12px rgba(0,0,0,.35); z-index: 2; line-height: 1; }
.cap { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-top: 10px; }
</style>
</head><body>
<div class="card">
  <div class="hero">
    <img src="../assets/be-real-be-you.jpeg" alt="Be Real, Be You">
    <div class="tagline">Be Real,<br>Be You.</div>
  </div>
  <div class="cap">Marketing hero · "Be Real, Be You" — script tagline only here, never in product UI</div>
</div>
</body></html>
