<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: 0; }
.row .meta { font-family: var(--font-mono); font-size: 11px; color: var(--storm-dust); width: 130px; flex: none; }
.specimen { font-family: var(--font-sans); color: var(--tuatara); }
.s-h2 { font-size: 26px; font-weight: 600; letter-spacing: -0.015em; }
.s-h3 { font-size: 20px; font-weight: 600; }
.s-h4 { font-size: 17px; font-weight: 600; }
.s-body { font-size: 14px; font-weight: 400; line-height: 1.5; }
.s-small { font-size: 13px; color: var(--storm-dust); }
.s-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .10em; text-transform: uppercase; color: var(--storm-dust); }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="meta">eyebrow · 12/600</div><div class="specimen s-eyebrow">Programs · Engineering</div></div>
  <div class="row"><div class="meta">h2 · 26/600</div><div class="specimen s-h2">Compare bachelors</div></div>
  <div class="row"><div class="meta">h3 · 20/600</div><div class="specimen s-h3">Year 2 — Curriculum highlights</div></div>
  <div class="row"><div class="meta">h4 · 17/600</div><div class="specimen s-h4">Methodology</div></div>

  <div class="row"><div class="meta">small · 13/400</div><div class="specimen s-small">Updated Sept 2025 · en/bachelor-artificial-intelligence</div></div>
</div>
</body></html>
