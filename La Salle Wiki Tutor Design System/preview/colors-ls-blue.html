<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; }
.hero { aspect-ratio: 2.6 / 1; border-radius: var(--r-md); background: var(--ls-blue); position: relative; }
.hero .name { position: absolute; left: 14px; top: 12px; color: white; font-weight: 600; }
.hero .label { position: absolute; left: 14px; bottom: 12px; font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,.95); background: rgba(0,0,0,.18); padding: 3px 8px; border-radius: 4px; }
.swatch { aspect-ratio: 1 / 1; }
.note { margin-top: 14px; font-size: 13px; color: var(--storm-dust); line-height: 1.55; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="hero"><div class="name">LS Blue</div><div class="label">#4FA8D8 · primary</div></div>
    <div class="swatch dark" style="background:var(--ls-blue-hover)"><div class="name">Hover</div><div class="label">#3E97C8</div></div>
    <div class="swatch dark" style="background:var(--ls-blue-press)"><div class="name">Press</div><div class="label">#2E7FAE</div></div>
    <div class="swatch bordered" style="background:var(--ls-blue-soft)"><div class="name" style="color:var(--ls-blue-press)">Soft</div><div class="label">#EAF4FB</div></div>
  </div>
  <div class="note"><strong style="color:var(--tuatara)">LS Blue earns its appearances.</strong> Primary actions, focus rings, citation chips, and tool-use highlights only — never as a wash.</div>
</div>
</body></html>
