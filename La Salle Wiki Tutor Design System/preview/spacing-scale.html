<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; align-items: end; }
.bar { background: var(--brand-400); border-radius: 4px; }
.bar-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 6px; text-align: center; }
.bar-name { font-family: var(--font-sans); font-size: 11px; font-weight: 600; color: var(--fg-2); margin-top: 2px; text-align: center; }
</style>
</head><body>
<div class="card">
  <div class="scale">
    <div><div class="bar" style="height:4px"></div><div class="bar-label">4</div><div class="bar-name">sp-1</div></div>
    <div><div class="bar" style="height:8px"></div><div class="bar-label">8</div><div class="bar-name">sp-2</div></div>
    <div><div class="bar" style="height:12px"></div><div class="bar-label">12</div><div class="bar-name">sp-3</div></div>
    <div><div class="bar" style="height:16px"></div><div class="bar-label">16</div><div class="bar-name">sp-4</div></div>
    <div><div class="bar" style="height:24px"></div><div class="bar-label">24</div><div class="bar-name">sp-6</div></div>
    <div><div class="bar" style="height:32px"></div><div class="bar-label">32</div><div class="bar-name">sp-8</div></div>
    <div><div class="bar" style="height:48px"></div><div class="bar-label">48</div><div class="bar-name">sp-12</div></div>
    <div><div class="bar" style="height:80px"></div><div class="bar-label">80</div><div class="bar-name">sp-20</div></div>
  </div>
</div>
</body></html>
