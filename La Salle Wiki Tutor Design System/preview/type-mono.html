<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: 0; }
.row .meta { font-family: var(--font-mono); font-size: 11px; color: var(--storm-dust); width: 130px; flex: none; }
.mono { font-family: var(--font-mono); color: var(--tuatara); }
.code-pill { display: inline-block; background: var(--hover); padding: 3px 8px; border-radius: 4px; font-family: var(--font-mono); font-size: 13px; color: var(--tuatara); }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="meta">mono · 13</div><div class="mono">en/bachelor-animation-and-vfx</div></div>
  <div class="row"><div class="meta">mono · pill</div><div><span class="code-pill">240 ECTS</span> &nbsp; <span class="code-pill">4 years</span> &nbsp; <span class="code-pill">EN</span></div></div>
  <div class="row"><div class="meta">tool name</div><div class="mono" style="color:var(--ls-blue-press); font-size: 14px;">search_programs</div></div>
  <div class="row"><div class="meta">used for</div><div class="mono" style="font-size: 12px; color:var(--storm-dust)">code · ids · ECTS · tool names · timestamps</div></div>
</div>
</body></html>
