<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.specimen { display: flex; flex-direction: column; gap: 10px; }
.greeting { font-family: var(--font-serif); font-weight: 500; font-size: 44px; line-height: 1.1; letter-spacing: -0.015em; color: var(--tuatara); }
.meta { font-family: var(--font-mono); font-size: 11px; color: var(--storm-dust); }
.note { font-size: 13px; color: var(--storm-dust); margin-top: 6px; }
</style>
</head><body>
<div class="card">
  <div class="specimen">
    <div class="meta">--font-serif · Source Serif 4 · 500 · 44/48</div>
    <div class="greeting">What would you like to study?</div>
    <div class="note">Source Serif appears <strong>only</strong> in the empty-state greeting. Everywhere else is Inter.</div>
  </div>
</div>
</body></html>
